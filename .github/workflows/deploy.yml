# Fetch fresh Artificial Analysis data, rebuild, and deploy to GitHub Pages.
#
# AA has no webhook, so the schedule polls four times an hour — but it only builds and
# deploys when the fetched data actually differs from what the live site
# serves (the build publishes its own models.json snapshot to diff against).
# Pushes and manual runs always deploy. If the fetch fails (AA markup change,
# API outage), the job fails before deploy and the site keeps serving the
# last good build.
name: Deploy

on:
  push:
    branches: [main]
  schedule:
    # GitHub can substantially delay or drop individual scheduled runs. Four
    # staggered polls make one delayed run harmless while still skipping builds
    # whenever Artificial Analysis has not changed.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write # scheduled job commits dated snapshots to history/
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Hydrate from the live snapshot so first-seen ("newest model") history
      # accumulates on the deployed data (models.json is gitignored, so checkout
      # has none). The fetch carries each model's addedAt forward from this file
      # and stamps only genuinely-new slugs. Only use the live copy once it
      # actually carries first-seen data; otherwise the fetch falls back to the
      # committed bootstrap map (scripts/first-seen.json) to seed the highlight.
      - name: Hydrate first-seen history from live site
        run: |
          if curl -sf https://ethangreeney.github.io/ai-analysis/models.json -o /tmp/live.json \
             && jq -e '[.models[].addedAt | values] | length > 0' /tmp/live.json >/dev/null 2>&1; then
            mkdir -p src/data    # gitignored dir: absent on a fresh checkout
            mv /tmp/live.json src/data/models.json
            echo "Hydrated first-seen history from live snapshot."
          else
            echo "No live first-seen data yet — fetch will bootstrap from scripts/first-seen.json."
          fi

      - name: Fetch latest model data
        run: npm run fetch
        env:
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
          SKIP_SCREENSHOT: "1"

      - name: Validate fetched snapshot size
        run: |
          rows=$(jq '.models | length' src/data/models.json)
          timed=$(jq '[.models[] | select(.e2eLatency != null and .e2eLatency > 0)] | length' src/data/models.json)
          if [ "$rows" -lt 300 ] || [ "$timed" -lt 250 ]; then
            echo "Refusing to deploy partial data: rows=$rows timed=$timed"
            exit 1
          fi

      # Compare fresh data (minus its fetch timestamp) against the snapshot
      # the live site serves. First deploy: the curl 404s and we deploy.
      - name: Check whether the data changed
        id: check
        run: |
          live=$(curl -sf https://ethangreeney.github.io/ai-analysis/models.json | jq -S 'del(.fetchedAt)' || echo "")
          fresh=$(jq -S 'del(.fetchedAt)' src/data/models.json)
          if [ "$live" = "$fresh" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new data — skipping deploy."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Archive a dated snapshot whenever the data changed, so history
      # accumulates in-repo (the live site only ever serves the latest
      # models.json). Same-day re-runs overwrite that day's file. [skip ci]
      # keeps the archive commit from re-triggering this workflow.
      - name: Archive dated snapshot
        if: steps.check.outputs.changed == 'true'
        run: |
          day=$(jq -r '.fetchedAt[:10]' src/data/models.json)
          mkdir -p history
          cp src/data/models.json "history/$day.json"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history
          if ! git diff --cached --quiet; then
            git commit -m "Archive data snapshot $day [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Build
        if: github.event_name != 'schedule' || steps.check.outputs.changed == 'true'
        run: |
          npm run build -- --base=/ai-analysis/
          cp src/data/models.json dist/models.json
          if [ -d history ]; then cp -R history dist/history; fi

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'schedule' || steps.check.outputs.changed == 'true'
        with:
          path: dist

      - id: deployment
        if: github.event_name != 'schedule' || steps.check.outputs.changed == 'true'
        uses: actions/deploy-pages@v4
